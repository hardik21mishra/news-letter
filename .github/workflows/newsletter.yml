name: Daily News Newsletter

on:
  schedule:
    # Runs at 8:00 AM UTC every day.
    # NOTE: this is UTC time, not your local time - adjust the hour
    # to match when you want it in your own timezone.
    - cron: "30 2 * * *"
  workflow_dispatch:
    # This adds a manual "Run workflow" button on GitHub,
    # so you can test it immediately without waiting for the schedule.

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python send_email.py